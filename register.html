<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up | DMTools.fun</title>
  <meta name="description" content="Sign up to DMTools.fun" />
  <meta http-equiv="refresh" content="0; url=/app.html?auth=register" />
  <link rel="stylesheet" href="/styles.css?v=20260212" />
</head>
<body>
  <main class="main-content">
    <div class="container" style="max-width: 760px; padding-top: 48px;">
      <section class="card" style="text-align: center; padding: 32px;">
        <h1 style="margin-bottom: 8px;">Create your account</h1>
        <p class="text-muted" style="margin-bottom: 20px;">Redirecting to sign up...</p>
        <button id="open-auth" type="button" class="btn btn-primary">Continue to sign up</button>
        <p style="margin-top: 16px; margin-bottom: 0;">
          <a id="go-app" href="/app.html?auth=register" class="btn btn-secondary">Go to app</a>
        </p>
      </section>
    </div>
  </main>

  <script>
    (function () {
      function buildTarget(defaultMode) {
        try {
          var url = new URL(window.location.href);
          var auth = (url.searchParams.get('auth') || '').toLowerCase();
          var mode = auth === 'login' ? 'login' : defaultMode;
          var target = new URL('/app.html', window.location.origin);
          target.searchParams.set('auth', mode);
          var returnTo = url.searchParams.get('returnTo');
          if (returnTo) {
            target.searchParams.set('returnTo', returnTo);
          }
          if (url.hash) {
            target.hash = url.hash;
          }
          return target.pathname + target.search + target.hash;
        } catch (e) {
          return '/app.html?auth=' + encodeURIComponent(defaultMode);
        }
      }

      var target = buildTarget('register');
      var openButton = document.getElementById('open-auth');
      var goApp = document.getElementById('go-app');

      if (goApp) {
        goApp.href = target;
      }
      if (openButton) {
        openButton.addEventListener('click', function () {
          window.location.href = target;
        });
      }

      window.location.replace(target);
    })();
  </script>
</body>
</html>
